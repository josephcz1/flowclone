# FlowClone configuration. Edit and restart the daemon to apply.

[model]
# Weight precision for the speech model, trading resident RAM for accuracy.
# (Attention layers stay full precision so the live-preview stream keeps working.)
#   "8bit" (default) — ~896 MB, byte-for-byte identical output to full precision
#                      on the benchmark clip, and slightly faster.
#   "4bit"           — ~692 MB, same words with rare cosmetic punctuation drift.
#   "none"           — ~1280 MB, full bf16 precision.
# Re-benchmark your own audio with `uv run python scripts/bench_quant.py` before
# trusting a lower setting on vocabulary the sample clip doesn't cover.
quantization = "8bit"

[cleanup]
# Master switch for the filler-strip and stutter-dedupe passes. The personal
# dictionary below still applies even when this is false.
enabled = true

# Collapse immediate word repeats: "the the API" -> "the API".
dedupe_stutters = true

# Append a trailing space so back-to-back dictations don't run together.
add_trailing_space = false

# Softer fillers to remove on top of the safe built-in set (um, uh, er, hmm…).
# These CAN be meaningful words, so they're opt-in. Uncomment what you want gone:
extra_fillers = [
    # "like",
    # "you know",
    # "i mean",
    # "basically",
    # "actually",
    # "sort of",
    # "kind of",
]

# Built-in fillers you'd rather keep (e.g. "er" if you dictate British spellings).
keep = []

# Personal dictionary: words parakeet reliably mishears -> what you meant.
# Case-insensitive, whole-word; multi-word keys take priority over single words.
[dictionary]
"cloud" = "Claude"
"cloud code" = "Claude Code"
"wispr" = "Wispr"
"para keet" = "parakeet"
